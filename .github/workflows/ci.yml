name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Cache the global NuGet package folder. Central Package Management means
      # Directory.Packages.props pins every version, so it's a precise cache key.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore gasmapquebec-api.slnx

      - name: Build
        id: build
        run: dotnet build gasmapquebec-api.slnx --configuration Release --no-restore

      # Test projects are discovered by name convention (**/*.<Category>Tests, any depth),
      # so adding a new module's test project — e.g. GasMapQuebec.FuelLog.UnitTests — needs no CI changes.
      - name: Architecture tests
        run: bash ./.github/run-tests.sh 'tests/**/*.ArchitectureTests.csproj'

      # Each suite runs even if an earlier one failed (but only once the build is good),
      # so a single run surfaces failures across all categories.
      - name: Unit tests
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        run: bash ./.github/run-tests.sh 'tests/**/*.UnitTests.csproj'

      - name: Integration tests
        if: ${{ !cancelled() && steps.build.outcome == 'success' }}
        run: bash ./.github/run-tests.sh 'tests/**/*.IntegrationTests.csproj'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ github.workspace }}/test-results
          if-no-files-found: ignore
